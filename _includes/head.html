<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <!-- Twitter cards -->
  <meta name="twitter:site"    content="@{{ site.twitter_username }}">
  <meta name="twitter:creator" content="@{{ page.author }}">
  <meta name="twitter:title"   content="{{ page.title }}">

  {% if page.summary %}
  <meta name="twitter:description" content="{{ page.summary }}">
  {% else %}
  <meta name="twitter:description" content="{{ page.description }}">
  {% endif %}

  {% if page.image %}
  <meta name="twitter:card"  content="summary_large_image">
  <meta name="twitter:image" content="{{ site.url }}{{ page.image }}">
  {% else %}
  <meta name="twitter:card"  content="summary">
  <meta name="twitter:image" content="{{ site.title_image }}">
  {% endif %}
  <!-- end of Twitter cards -->

  {% seo %}

  <script>
    (function() {
      try {
        var storedTheme = localStorage.getItem("theme");
        document.documentElement.dataset.theme = storedTheme || "light";
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/redesign.css' | relative_url }}?v=20260630-5">
  
  {% if site.rtl %}<link rel="stylesheet" href="{{ '/assets/rtl.css' | relative_url }}">{% endif %}
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">


  <!-- RSS -->
  {% feed_meta %}

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P9G89F6KLE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-P9G89F6KLE');
  </script>
  <script defer src="{{ '/assets/js/theme.js' | relative_url }}?v=20260630-5"></script>

  {% if page.mermaid %}
    {% include mermaid.html %}
  {% endif %}


  <meta name="google-site-verification" content="IIGuc7fvGY3M_a9vp7KXPigMF_kUuwifsvAEWgPWNaU" />

</head>
