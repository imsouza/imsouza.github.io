<footer>
  <div class="footer-shell">
    <div class="footer-social">
      {% for social in site.data.about.social_icons %}
        <a class="social" toggle="tooltip" data-placement="top" title="{{ social.name }}" aria-label="{{ social.name }}" href="{{ social.url | relative }}" target="_blank" rel="noreferrer">
          {% include icon.html name=social.icon %}
          <span class="sr-only">{{ social.name }}</span>
        </a>
      {% endfor %}
    </div>
    <span>
      &copy; <time datetime="{{ site.time }}">{{ site.time | date: '%Y' }}</time> {{ site.author.name }}. Built with Jekyll.
    </span>
  </div>
</footer>
