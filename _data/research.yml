    - "Causalidade"
    - "Trabalho em equipe"

- title: "Sistemas Operacionais de Tempo Real para Sistemas Embarcados"
  project_title: "Estudo comparativo de RTOS para seleção em projetos embarcados"
  period: "jan de 2023 - jul de 2023"
  institution: "Pesquisa concluída"
  description: "Pesquisador principal: Mateus Almeida. Pesquisa bibliográfica e análise comparativa de sistemas operacionais de tempo real para sistemas embarcados, considerando desempenho, determinismo, latência, suporte a padrões industriais, segurança, consumo de recursos, facilidade de uso, documentação e aplicação em projetos específicos. O estudo compara referências sobre FreeRTOS, RIOT, uC/OS-II, uC/OS-III, RT-Thread, Keil RTX e outros RTOS, com foco em apoiar decisões técnicas informadas para projetos embarcados."
  skills:
    - "RTOS"
    - "Sistemas embarcados"
    - "FreeRTOS"
    - "RIOT"
    - "Benchmark"
    - "Relatórios técnicos"
