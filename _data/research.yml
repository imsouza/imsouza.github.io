- title: "Agente Autônomo para Auditoria de Redes e Infraestrutura com Tecnologias Abertas"
  project_title: "Como democratizar o acesso a ferramentas de cibersegurança voltadas à auditoria de redes e infraestrutura por meio de tecnologias gratuitas, abertas e de baixo custo computacional?"
  period: "jan de 2026 - atualmente"
  institution: "Trabalho em desenvolvimento"
  description: "Pesquisa em desenvolvimento para o TCC, com foco na criação de uma plataforma de cibersegurança acessível para auditoria de redes e infraestrutura. A proposta explora um agente autônomo com memória, grafo de conhecimento, ranqueamento de decisões e geração de relatórios técnicos. O projeto usa APIs gratuitas como NVIDIA NIM e Hugging Face, com objetivo de reduzir dependência de alto custo computacional e evoluir para execução local em ambientes limitados, como Raspberry Pi."
  skills:
    - "Cibersegurança"
    - "Agentes autônomos"
    - "LLM"
    - "NVIDIA NIM"
    - "Hugging Face"
    - "Grafo de conhecimento"
    - "Baixo custo computacional"

- title: "Um Algoritmo de Agendamento baseado em Aprendizado por Reforço para Gerenciamento de Energia em Casas Inteligentes"
  project_title: "Identificação Autônoma de Equipamentos Eletroeletrônicos em Smart Grid"
  period: "set de 2024 - out de 2025"
  institution: "Universidade Federal do Espírito Santo"
  description: "Pesquisa em Smart Grids com aplicação de aprendizado por reforço para desenvolver algoritmos autônomos de identificação, classificação e gerenciamento de equipamentos eletroeletrônicos em ambientes residenciais. O foco é otimizar consumo energético, agendamento de recursos e automação em casas inteligentes."
  skills:
    - "Aprendizagem por reforço"
    - "Smart Grids"
    - "Otimização"
    - "Trabalho em equipe"

- title: "Métodos Tradicionais para Causalidade em Séries Temporais"
  project_title: "Métodos de Aprendizado de Máquina para Séries Temporais Multivariadas"
  period: "set de 2022 - ago de 2023"
