intro:
  - <p>Sou Mateus Almeida, estudante de Ciência da Computação no CEUNES/UFES, com atuação em Ciência de Dados, Inteligência Artificial, Machine Learning, Deep Learning, LLMs, automação e desenvolvimento de soluções digitais.</p>
  - <p>Minha trajetória combina pesquisa acadêmica, desenvolvimento web, suporte e redes, automações em Python, criação de RAGs e auditoria de segurança. Também faço parte do time de desenvolvimento da Opt Labs, com foco em automação e IA para pequenos negócios.</p>
  - <p>Atuei em projetos de séries temporais, aprendizado por reforço, Smart Grids, visão computacional, NLP e sistemas web. Minha formação também passa por design gráfico, o que fortalece minha visão de produto, comunicação e experiência visual.</p>
  - <p>Este portfólio reúne projetos, publicações, notas técnicas e experiências profissionais que conectam pesquisa, engenharia e aplicação prática de tecnologia.</p>

